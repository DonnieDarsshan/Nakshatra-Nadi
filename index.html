<script>

/* ======================================================
   GLOBAL
====================================================== */

let DATA=null;
let CUSPS=[];
let PLANETS={};


/* ======================================================
   GLOBAL TOGGLES (ENGINE LEVEL)
====================================================== */

let IGNORE_CUSPAL = false;
let SHIFTED_LORDSHIP = true;   // 🔥 GLOBAL ENGINE FLAG
let NODE_CUSPAL_ENABLED = false;

/* ==============================
   UI STATE MEMORY
============================== */

let UI_STATE = {
  ninePlanetsExpanded:false,
  compressedExpanded:false
};

/* ======================================================
   PIVOT OPTIONS
====================================================== */

const pivotSel=document.getElementById("pivotSelect");

function addPivot(v){
  const o=document.createElement("option");
  o.value=v;
  o.text=v;
  pivotSel.appendChild(o);
}

addPivot("Lagna");
["Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha","Ketu","Venus"].forEach(addPivot);
for(let i=1;i<=12;i++) addPivot(i+"CSL");

pivotSel.onchange=()=>{







  const pivot=pivotSel.value;

  /* if pivot is a planet → sync planet order dropdown */
  if(PLANETS[pivot]){
    planetOrderSel.value=pivot;
  }

  if(DATA) buildAll();
};


/* ======================================================
   SIGN LORDS
====================================================== */

const SIGN_LORDS={
Aries:"Mangala",
Taurus:"Venus",
Gemini:"Budha",
Cancer:"Chandra",
Leo:"Surya",
Virgo:"Budha",
Libra:"Venus",
Scorpio:"Mangala",
Sagittarius:"Jupiter",
Capricorn:"Saturn",
Aquarius:"Saturn",
Pisces:"Jupiter"
};

const SIGNS=[
"Aries","Taurus","Gemini","Cancer",
"Leo","Virgo","Libra","Scorpio",
"Sagittarius","Capricorn","Aquarius","Pisces"
];


/* ======================================================
   KP CONSTANTS
====================================================== */

const KP_ORDER=[
"Ketu","Venus","Surya","Chandra","Mangala",
"Rahu","Jupiter","Saturn","Budha"
];

const KP_YEARS={
Ketu:7,Venus:20,Surya:6,Chandra:10,
Mangala:7,Rahu:18,Jupiter:16,Saturn:19,Budha:17
};

const STAR_LEN=13+20/60;


const DBA_SEQUENCE=[
"Surya","Chandra","Mangala","Rahu",
"Jupiter","Saturn","Budha","Ketu","Venus"
];

const planetOrderSel=document.getElementById("planetOrder");

function fillPlanetOrder(){
  planetOrderSel.innerHTML="";
  DBA_SEQUENCE.forEach(p=>{
    const o=document.createElement("option");
    o.value=p;
    o.text=p;
    planetOrderSel.appendChild(o);
  });
}

fillPlanetOrder();
planetOrderSel.onchange=()=>{ if(DATA) buildAll(); };

function rotatedDBA(start){
  const i=DBA_SEQUENCE.indexOf(start);
  return [...DBA_SEQUENCE.slice(i),...DBA_SEQUENCE.slice(0,i)];
}

/* ======================================================
   FILE LOAD
====================================================== */

document.getElementById("jsonLoader").onchange=e=>{

  const f=e.target.files[0];
  if(!f) return;

  const r=new FileReader();

  r.onload=()=>{
    DATA=JSON.parse(r.result);
    parseSwiss();
    buildAll();
  };

  r.readAsText(f);
};











function parseSwiss(){

  /* 🔥 FORCE LAHIRI */
  const lahiri = DATA.ayanamshas?.["Lahiri"];

  if(!lahiri){
    alert("Lahiri ayanamsha not found in JSON");
    return;
  }

  /* LOAD CUSPS FROM LAHIRI */
  CUSPS = [];
  for(let i=1;i<=12;i++){
    CUSPS[i] = lahiri.cusps[i];
  }

  const useTrue=document.getElementById("trueNode").checked;

  PLANETS = {};

  /* LOAD PLANETS FROM LAHIRI */
  Object.keys(lahiri.planets).forEach(p=>{
    if(p==="Rahu"||p==="Ketu"||p==="Rahu_true"||p==="Ketu_true") return;
    PLANETS[p] = lahiri.planets[p];
  });

  /* NODE HANDLING */
  PLANETS.Rahu = useTrue
    ? lahiri.planets.Rahu_true
    : lahiri.planets.Rahu;

  PLANETS.Ketu = useTrue
    ? lahiri.planets.Ketu_true
    : lahiri.planets.Ketu;
}


/* ======================================================
   BASIC HELPERS
====================================================== */

function angDiff(a,b){
  let d=Math.abs(a-b);
  if(d>180) d=360-d;
  return d;
}

function signOf(abs){
  return SIGNS[Math.floor(abs/30)];
}


/* ======================================================
   VEDIC ASPECTS (FROM BASE PROJECT)
====================================================== */

const VEDIC_ASPECTS={
Surya:[7],
Chandra:[7],
Budha:[7],
Venus:[7],
Mangala:[4,7,8],
Jupiter:[5,7,9],
Saturn:[3,7,10]
};


/* ======================================================
   PLANETS INFLUENCING NODE
   (CONJUNCTION + ASPECT)
====================================================== */

function nodeInfluencingHouses(node){

  const nodeAbs=PLANETS[node];
  const nodeHouse=rotateHouse(rawHouseOf(nodeAbs));

  const houses=[];

  Object.keys(PLANETS).forEach(p=>{

    /* nodes never influence nodes */
    if(p===node) return;
    if(p==="Rahu" || p==="Ketu") return;

    const pAbs=PLANETS[p];
    const pHouse=rotateHouse(rawHouseOf(pAbs));

    /* conjunction */
    const isConj = angDiff(nodeAbs,pAbs) <= 13;

    /* incoming aspect */
    let isAspect=false;

    /* only planets with defined aspects can aspect */
	const aspects = VEDIC_ASPECTS[p];

	if(aspects){

	  aspects.forEach(a=>{
		let h=pHouse+(a-1);
		if(h>12) h-=12;
		if(h===nodeHouse) isAspect=true;
	  });

	}

    if(isConj || isAspect){

      /* ===============================
         TAKE PLANET FULL SCRIPT DIRECTLY
         =============================== */

      const hs = houseString(p);      // e.g. 3-3,4,7,10
      const parts = hs.split("-")[1];

      if(parts){
        parts.split(",").forEach(n=>{
          const num=parseInt(n);
          if(!isNaN(num)) houses.push(num);
        });
      }

    }

  });

  return houses;
}








/* ======================================================
   RAW HOUSE FROM CUSPS
====================================================== */

function rawHouseOf(abs){

  const kpMode=document.getElementById("kpMode").checked;
  const signMode=document.getElementById("signMode").checked;

  /* ============================
     KP MODE → CUSP BASED
  ============================ */
  if(kpMode){

    for(let i=1;i<=12;i++){

      let start=CUSPS[i];
      let end=CUSPS[i+1]??CUSPS[1]+360;

      if(end<start) end+=360;

      let a=abs;
      if(a<start) a+=360;

      if(a>=start && a<end) return i;
    }

    return 1;
  }

  /* ============================
     SIGN TO SIGN MODE
     SIGN COUNT FROM LAGNA SIGN
  ============================ */

  if(signMode){

    const lagnaSignIndex=Math.floor(CUSPS[1]/30);
    const planetSignIndex=Math.floor(abs/30);

    let h=planetSignIndex-lagnaSignIndex+1;

    while(h<=0) h+=12;
    while(h>12) h-=12;

    return h;
  }

  return 1;
}


/* ======================================================
   PIVOT ROTATION
====================================================== */

function pivotHouse(){

  const p=pivotSel.value;

  if(p==="Lagna") return 1;

  if(p.endsWith("CSL")){
    return parseInt(p);
  }

  return rawHouseOf(PLANETS[p]);
}

function rotateHouse(h){

  const pivot=pivotHouse();

  let x=h-pivot+1;

  while(x<=0) x+=12;
  while(x>12) x-=12;

  return x;
}







/* ======================================================
   FIND UNTENANTED PLANETS
====================================================== */

function getUntenantedPlanets(){

  const houseCount={};

  Object.keys(PLANETS).forEach(p=>{

    const h=rotateHouse(rawHouseOf(PLANETS[p]));

    if(!houseCount[h]) houseCount[h]=[];
    houseCount[h].push(p);

  });

  const result={};

  Object.keys(houseCount).forEach(h=>{
    if(houseCount[h].length===1){
      result[houseCount[h][0]] = true;
    }
  });

  return result;
}


/* ======================================================
   LORDSHIP FROM CUSP SIGNS
====================================================== */

function lordships(planet){

  /* ==============================
     CHECK PIVOT TYPE
     DO NOT SHIFT IF CSL PIVOT
  ============================== */
  const pivot = pivotSel.value;
  const isCSLPivot = pivot.endsWith("CSL");

  /* ==============================
     LAGNA DEGREE CHECK
  ============================== */
  const lagnaAbs = CUSPS[1];
  const lagnaSignIndex = Math.floor(lagnaAbs / 30);
  const lagnaDegreeInSign = lagnaAbs % 30;

  /* ==============================
     FINAL SHIFT DECISION
  ============================== */
  const applyShift =
    SHIFTED_LORDSHIP &&
    !isCSLPivot &&
    lagnaDegreeInSign >= 15;

  const list = [];

  for(let i=1;i<=12;i++){

    let signIndex = Math.floor(CUSPS[i] / 30);

    if(applyShift){
      signIndex = (signIndex + 1) % 12;
    }

    const signName = SIGNS[signIndex];

    if(SIGN_LORDS[signName] === planet){
      list.push(rotateHouse(i));
    }
  }

  return list;
}









/* ======================================================
   CUSPAL CONJUNCTION (7 PLANETS ONLY)
====================================================== */

function cuspConj(planet,abs){

  /* =====================================
     🔥 GLOBAL MASTER SWITCH

  others.push(placed);

  return placed + "-" + others.join(",");

/* ======================================================
   HOUSE STRING PARSER
====================================================== */

function splitHouseString(str){

  const [p,rest]=str.split("-");
  const placed=parseInt(p);

  const list=rest
    .split(",")
    .map(x=>parseInt(x))
    .filter(x=>!isNaN(x));

  return {placed,list};
}

function combineHouseStrings(h1,h2){

  const A=splitHouseString(h1);
  const B=splitHouseString(h2);

  const placed="("+A.placed+"+"+B.placed+")";

  const merged=[...new Set([...A.list,...B.list])];
  merged.sort((a,b)=>a-b);

  return placed+" - "+merged.join(",");
}





/* ======================================================
   HOUSE STRING
====================================================== */

function normalizeHouseString(str){

  const parts=str.split("-");
  const placed=parts[0];

  const list=parts[1]
    .split(",")
    .map(x=>parseInt(x))
    .filter(x=>!isNaN(x));

  const unique=[...new Set(list)];
  unique.sort((a,b)=>a-b);

  return placed+"-"+unique.join(",");
}

function houseString(p){

  let raw;

  if(p==="Rahu"||p==="Ketu") raw=nodeFullHouses(p);
  else raw=normalPlanetHouses(p);

  return normalizeHouseString(raw);
}


/* ======================================================
   KP LEVEL
====================================================== */

function starLord(abs){
  const i=Math.floor(abs/STAR_LEN)%9;
  return KP_ORDER[i];
}

function subLord(abs){

  const star=starLord(abs);
  const start=KP_ORDER.indexOf(star);
  const pos=abs%STAR_LEN;

  let acc=0;

  for(let i=0;i<9;i++){
    const p=KP_ORDER[(start+i)%9];
    const span=(KP_YEARS[p]/120)*STAR_LEN;
    acc+=span;
    if(pos<=acc) return p;
  }
}

function subSub(abs){

  const star=starLord(abs);
  const sub=subLord(abs);

  const sIndex=KP_ORDER.indexOf(star);
  const subIndex=KP_ORDER.indexOf(sub);

  const pos=abs%STAR_LEN;

  let acc=0;

  for(let i=0;i<9;i++){

    const p=KP_ORDER[(sIndex+i)%9];
    const span=(KP_YEARS[p]/120)*STAR_LEN;

    if(pos>acc && pos<=acc+span){

      let inner=pos-acc;
      let acc2=0;

      for(let j=0;j<9;j++){
        const q=KP_ORDER[(subIndex+j)%9];
        const span2=(KP_YEARS[q]/120)*span;
        acc2+=span2;
        if(inner<=acc2) return q;
      }
    }

    acc+=span;
  }
}

/* ======================================================
   BUILD LORDSHIP GOOD OR BAD DECEIDER
   ASC ORDER (1 → 12 LORDS)
====================================================== */

function buildLordshipDecider(wrap){

  const old = document.getElementById("lordshipDeciderTable");
  if(old) old.remove();

  /* ==============================
     FIND BASE ABSOLUTE DEGREE
     BASE = CURRENT PIVOT
  ============================== */

  let baseAbs;

  const pivot = pivotSel.value;

  if(pivot === "Lagna"){
    baseAbs = CUSPS[1];
  }
  else if(pivot.endsWith("CSL")){
    const num = parseInt(pivot);
    baseAbs = CUSPS[num];
  }
  else{
    baseAbs = PLANETS[pivot];
  }

  /* ==============================
     BASE SIGN (WITH SHIFT RULE)
  ============================== */

  let baseSignIndex = Math.floor(baseAbs / 30);

  const isCSLPivot = pivot.endsWith("CSL");
  const baseDegreeInSign = baseAbs % 30;

  const applyShift =
    SHIFTED_LORDSHIP &&
    !isCSLPivot &&
    baseDegreeInSign >= 15;

  if(applyShift){
    baseSignIndex = (baseSignIndex + 1) % 12;
  }

  const baseSignName = SIGNS[baseSignIndex];

  /* ==============================
     TITLE
  ============================== */

  const title=document.createElement("h2");
  title.textContent =
    "LORDSHIP GOOD OR BAD DECEIDER : " + baseSignName.toUpperCase();

  title.style.marginTop="40px";
  wrap.appendChild(title);

  /* ==============================
     TABLE
  ============================== */

  const table=document.createElement("table");
  table.id="lordshipDeciderTable";

  const head=document.createElement("tr");
  head.innerHTML=
    "<th>PLANET</th>"+
    "<th>LORDSHIP</th>"+
    "<th>PLACED IN</th>"+
    "<th>RESULT</th>";

  table.appendChild(head);

  /* ==============================
     HOUSE LORD FROM PIVOT SIGN
  ============================== */

  function houseLord(houseNum){

    let signIndex = (baseSignIndex + (houseNum - 1)) % 12;
    const signName = SIGNS[signIndex];
    return SIGN_LORDS[signName];
  }










/* ==============================
   BUILD 12 LORD ROWS
============================== */

for(let lordHouse=1; lordHouse<=12; lordHouse++){

  const planet = houseLord(lordHouse);

  const placedHouse =
    rotateHouse(rawHouseOf(PLANETS[planet]));

  const rule = LORDSHIP_MATRIX[lordHouse];

  let result="";

  if(rule.excellent.includes(placedHouse)) result="Excellent";
  else if(rule.good.includes(placedHouse)) result="Good";
  else if(rule.average.includes(placedHouse)) result="Average";
  else if(rule.bad.includes(placedHouse)) result="Bad";
  else if(rule.worst.includes(placedHouse)) result="Worst";

  const tr=document.createElement("tr");

  tr.innerHTML=
    "<td>"+planet+"</td>"+
    "<td>"+lordHouse+"</td>"+
    "<td>"+placedHouse+"</td>"+
    "<td>"+result+"</td>";

  table.appendChild(tr);
}

/* =====================================================
   ADD RAHU & KETU LORDSHIP ROWS (DISPOSITOR BASED)
===================================================== */

function addNodeLordRows(nodeName){

  const abs = PLANETS[nodeName];
  if(abs===undefined) return;

  /* placement house still used for result evaluation */
  const placedHouse = rotateHouse(rawHouseOf(abs));

  /* =====================================
     TRUE ZODIAC SIGN OF NODE
     NEVER SHIFTED
     NEVER KP
     NEVER PIVOT
  ===================================== */

  const signIndex = Math.floor(abs / 30);
  const signName  = SIGNS[signIndex];
  const dispositor = SIGN_LORDS[signName];

  /* find which houses dispositor owns from pivot base */
  const ownedHouses = [];

  for(let h=1; h<=12; h++){
    if(houseLord(h) === dispositor){
      ownedHouses.push(h);
    }
  }

  /* build rows */
  ownedHouses.forEach(lordHouse=>{

    const rule = LORDSHIP_MATRIX[lordHouse];

    let result="";

    if(rule.excellent.includes(placedHouse)) result="Excellent";
    else if(rule.good.includes(placedHouse)) result="Good";
    else if(rule.average.includes(placedHouse)) result="Average";
    else if(rule.bad.includes(placedHouse)) result="Bad";
    else if(rule.worst.includes(placedHouse)) result="Worst";

    const lordSignIndex = (baseSignIndex + (lordHouse-1)) % 12;
    const lordSignName = SIGNS[lordSignIndex];

    const tr=document.createElement("tr");

    tr.innerHTML=
      "<td>"+nodeName+" ("+lordSignName.slice(0,3)+")</td>"+
      "<td>"+lordHouse+"</td>"+
      "<td>"+placedHouse+"</td>"+
      "<td>"+result+"</td>";

    table.appendChild(tr);

  });
}

/* add Rahu rows */
addNodeLordRows("Rahu");

/* add Ketu rows */
addNodeLordRows("Ketu");

/* 🔥 VERY IMPORTANT — APPEND TABLE */
wrap.appendChild(table);

/* =========================================================
   VIMSHOTTARI ENGINE (FULL TREE + NADI LINKED)
========================================================= */

let VIM_VISUAL_OFFSET = 0;

const VIM_ORDER=["Ketu","Venus","Surya","Chandra","Mangala","Rahu","Jupiter","Saturn","Budha"];
const VIM_YEARS={Ketu:7,Venus:20,Surya:6,Chandra:10,Mangala:7,Rahu:18,Jupiter:16,Saturn:19,Budha:17};
const MS_YEAR=365.25*24*60*60*1000;
const NAK_SIZE=360/27;

/* ================= READ FROM NADI TABLE ================= */

function getNadiEffFromTable(planet){

  const table=document.querySelector("#nadiIntegratedWrap table");
  if(!table) return {A:"",B:"",C:""};

  for(const r of table.querySelectorAll("tr")){
    const t=r.children[0]?.textContent || "";
    if(t.startsWith(planet+" ")){
      return{
        A:r.children[6]?.textContent || "",
        B:r.children[7]?.textContent || "",
        C:r.children[8]?.textContent || ""
      };
    }
  }
  return {A:"",B:"",C:""};
}

/* ================= DOB ================= */

function vimDOB(){
 if(DATA?.meta?.datetime_utc)
   return new Date(DATA.meta.datetime_utc);
 return null;
}

function vimMoonAbs(){ return PLANETS["Chandra"]; }
function vimLagnaAbs(){ return CUSPS[1]; }

/* ================= FORMAT ================= */

function vimFmt(d){
 const hide=document.getElementById("vimHideDate")?.checked;
 if(!hide) return d.toISOString().slice(0,10);

 const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
 return d.getFullYear()+"-"+m[d.getMonth()];
}

/* ================= AGE ================= */

function vimAge(date){
 const dob=vimDOB();
 if(!dob) return "";
 let days=(date-dob)/(1000*60*60*24);
 let y=Math.floor(days/365.25);
 let m=Math.floor((days%365.25)/30.44);
 return `${y} y ${m} m`;
}

/* ================= START ================= */

function vimStart(abs,d){
 let nak=Math.floor(abs/NAK_SIZE);
 let lord=VIM_ORDER[nak%9];
 let frac=(abs%NAK_SIZE)/NAK_SIZE;
 let elapsed=VIM_YEARS[lord]*frac;
 return{lord,start:new Date(d.getTime()-elapsed*MS_YEAR)};
}

function vimRotate(p){
 let i=VIM_ORDER.indexOf(p);
 return [...VIM_ORDER.slice(i),...VIM_ORDER.slice(0,i)];
}

function vimAddYears(d,y){
 return new Date(d.getTime()+y*MS_YEAR);
}

/* ================= TREE BUILD ================= */

function vimBuild(level,start,planet,years,max){
 if(level>max) return [];
 let out=[],cur=new Date(start);

 vimRotate(planet).forEach(p=>{
  let y=years*(VIM_YEARS[p]/120);
  let end=vimAddYears(cur,y);

  out.push({
   level,
   planet:p,
   start:new Date(cur),
   end:new Date(end),
   children:vimBuild(level+1,cur,p,y,max)
  });

  cur=end;
 });

 return out;
}

/* ================= ROW ================= */

function vimMakeRow(node,level){

 const row=document.createElement("div");
 row.className="vimRow vimLevel"+level;

 const now=Date.now()+VIM_VISUAL_OFFSET;

 const start=new Date(node.start.getTime()+VIM_VISUAL_OFFSET);
 const end=new Date(node.end.getTime()+VIM_VISUAL_OFFSET);

 row.dataset.start=start.getTime();
 row.dataset.end=end.getTime();
 row.dataset.level=level;

 let symbol="";
 if(now>=row.dataset.start && now<row.dataset.end){
   if(level===1) symbol="💥";
   if(level===2) symbol="🔥";
   if(level===3) symbol="🕉";
 }

 let label=["Mahadasha","Bukthi","Antara"][level-1];

 const eff=getNadiEffFromTable(node.planet);

 let displayStart=start;
 if(level===1 && node.isFirstMahadasha){
   displayStart=vimDOB();
 }

 row.innerHTML=`
 <div class="vimSymbol">${symbol}</div>
 <div><b>${label} – ${node.planet}</b></div>
 <div>${vimFmt(displayStart)}</div>
 <div>{ ${level===1 && node.isFirstMahadasha ? "0 y 0 m" : vimAge(displayStart)} }</div>
 <div>${vimFmt(end)}</div>
 <div>{ ${vimAge(end)} }</div>
 <div></div>
 <div>${eff.A}</div>
 <div>${eff.B}</div>
 <div>${eff.C}</div>
 `;

 return row;
}

/* ================= NODE RENDER ================= */

function renderNode(node,level,parent){

 const wrap=document.createElement("div");
 wrap.className="vimNode";

 const row=vimMakeRow(node,level);
 wrap.appendChild(row);

 const children=document.createElement("div");
 children.className="vimChildren";
 children.style.display="none";
 wrap.appendChild(children);

 parent.appendChild(wrap);

 if(node.children){
   node.children.forEach(c=>renderNode(c,level+1,children));
 }
 
 
 
 
 
 
 
 
 
 
 

row.onclick = () => {

  const lvl = row.dataset.level;

  /* =====================================
     REMOVE PREVIOUS SELECTION OF SAME LEVEL
  ===================================== */

  document.querySelectorAll(".vimRow").forEach(r => {
    if(r.dataset.level === lvl){
      r.classList.remove(
        "vimSelectedLevel1",
        "vimSelectedLevel2",
        "vimSelectedLevel3"
      );
    }
  });

  /* =====================================
     APPLY TO CURRENT ROW ONLY
  ===================================== */

  if(lvl === "1") row.classList.add("vimSelectedLevel1");
  if(lvl === "2") row.classList.add("vimSelectedLevel2");
  if(lvl === "3") row.classList.add("vimSelectedLevel3");

  /* =====================================
     TREE EXPANSION (unchanged)
  ===================================== */

  const open = children.style.display === "block";

  parent.querySelectorAll(":scope > .vimNode .vimChildren")
        .forEach(c => c.style.display = "none");

  children.style.display = open ? "none" : "block";
};



 
 
 
}

/* ================= RENDER ================= */

function vimRender(boxId,abs){

 let d=vimDOB();
 if(!d || !abs) return;

 let start=vimStart(abs,d);
 let box=document.getElementById(boxId);

 box.innerHTML=`
 <div class="vimHead">
 <div></div><div>Planet</div><div>Start</div><div>Age</div>
 <div>End</div><div>Age</div><div></div>
 <div>EFF A</div><div>EFF B</div><div>EFF C</div>
 </div>
 `;

 let cur=new Date(start.start);

 vimRotate(start.lord).forEach((p,i)=>{

   let end=vimAddYears(cur,VIM_YEARS[p]);

   const node={
     planet:p,
     start:new Date(cur),
     end:new Date(end),
     isFirstMahadasha:i===0,
     children:vimBuild(2,cur,p,VIM_YEARS[p],3)
   };

   renderNode(node,1,box);
   cur=end;
 });
}

/* ================= FIND ================= */








function vimFindDate(){

 const val=document.getElementById("vimSearchDate").value;
 if(!val) return;

 /* =====================================
    IMPORTANT:
    User selects REAL DATE.
    Timeline is visually shifted.
    So convert search date → shifted space.
 ===================================== */

 const searchTime = new Date(val).getTime();

 /* collapse all */
 document.querySelectorAll(".vimChildren")
   .forEach(c=>c.style.display="none");

 /* clear old selections */
 document.querySelectorAll(
   ".vimSelectedLevel1,.vimSelectedLevel2,.vimSelectedLevel3"
 ).forEach(r=>{
   r.classList.remove(
     "vimSelectedLevel1",
     "vimSelectedLevel2",
     "vimSelectedLevel3"
   );
 });

 /* =====================================
    MATCH AGAINST SHIFTED ROW TIMES
 ===================================== */

 const matches=[...document.querySelectorAll(".vimRow")]
  .filter(r=>{
     const start = Number(r.dataset.start);
     const end   = Number(r.dataset.end);
     return searchTime >= start && searchTime < end;
  })
  .sort((a,b)=>a.dataset.level-b.dataset.level);

 matches.forEach(r=>{

   const lvl=r.dataset.level;

   if(lvl=="1") r.classList.add("vimSelectedLevel1");
   if(lvl=="2") r.classList.add("vimSelectedLevel2");
   if(lvl=="3") r.classList.add("vimSelectedLevel3");

   /* expand parents */
   let p=r.closest(".vimNode");
   while(p){
     const ch=p.querySelector(".vimChildren");
     if(ch) ch.style.display="block";
     p=p.parentElement.closest(".vimNode");
   }
 });

}
